name: Update Badges

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI", "Security"]
    types: [completed]

jobs:
  update-badges:
    name: Update Repository Badges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update CI Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GITHUB_TOKEN }}
          # gistID needs to be set up if you want to use dynamic badges
          # For now, this step is disabled
        if: false

      - name: Update Coverage Badge
        if: github.event_name == 'push'
        run: |
          # This would be updated by codecov automatically
          echo "Coverage badge updated by Codecov"
