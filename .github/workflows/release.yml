name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.3)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean
      publish_crates:
        description: 'Publish to crates.io'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  # Verify CI passed before releasing
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
      - name: Wait for CI to complete
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.ref }}
          check-name: 'CI'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      - name: Verify CI passed for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Check if the latest CI run on main passed
          echo "Checking CI status for manual dispatch..."
          gh run list --workflow=CI --branch=main --limit=1 --json conclusion | jq -r '.[0].conclusion' > /tmp/conclusion
          CONCLUSION=$(cat /tmp/conclusion)
          echo "CI conclusion: $CONCLUSION"
          if [[ "$CONCLUSION" != "success" ]]; then
            echo "CI must pass before releasing"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create GitHub release
  create-release:
    needs: [check-ci]
    name: Create Release
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.check-ci.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Generate changelog from git log
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGELOG=$(git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD 2>/dev/null || git log --pretty=format:"- %s" --max-count=20)
          else
            # For manual dispatch, get changes since last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -n "$LAST_TAG" ]]; then
              CHANGELOG=$(git log --pretty=format:"- %s" $LAST_TAG..HEAD)
            else
              CHANGELOG=$(git log --pretty=format:"- %s" --max-count=20)
            fi
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check-ci.outputs.version }}
          release_name: Release ${{ needs.check-ci.outputs.version }}
          body: |
            ## Changes in ${{ needs.check-ci.outputs.version }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation

            Add this to your `Cargo.toml`:

            ```toml
            [dependencies]
            balinese-calendar = "${{ needs.check-ci.outputs.version }}"
            ```
          draft: false
          prerelease: ${{ contains(needs.check-ci.outputs.version, 'alpha') || contains(needs.check-ci.outputs.version, 'beta') || contains(needs.check-ci.outputs.version, 'rc') }}

  # Publish to crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_crates == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build and upload release artifacts (optional - for binary crates)
  build-artifacts:
    name: Build Artifacts
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: balinese-calendar-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: balinese-calendar-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: balinese-calendar-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # Note: This step is optional since this is a library crate
      # Uncomment if you add binary targets in the future
      # - name: Build binary
      #   run: cargo build --release --target ${{ matrix.target }}
      # - name: Upload artifact
      #   uses: actions/upload-release-asset@v1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   with:
      #     upload_url: ${{ needs.create-release.outputs.upload_url }}
      #     asset_path: target/${{ matrix.target }}/release/balinese-calendar${{ matrix.os == 'windows-latest' && '.exe' || '' }}
      #     asset_name: ${{ matrix.artifact_name }}
      #     asset_content_type: application/octet-stream

  # Update documentation
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: publish
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_crates == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          cname: docs.balinese-calendar.dev  # Optional: if you have a custom domain
