name: Documentation

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build Astro documentation
  build-astro:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('docs/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          cd docs
          pnpm install

      - name: Build Astro site
        run: |
          cd docs
          pnpm run build

      - name: Upload astro artifact
        uses: actions/upload-artifact@v7
        with:
          name: astro
          path: docs/dist/
          retention-days: 1

  # Build Rust API documentation
  build-rustdoc:
    name: Build Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build API documentation
        run: |
          cargo doc --no-deps --all-features
          mkdir -p public/api
          cp -r target/doc/* public/api/

      - name: Upload rustdoc artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustdoc
          path: target/doc/
          retention-days: 1

  # Combine and deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-astro, build-rustdoc]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download astro artifact
        uses: actions/download-artifact@v4
        with:
          name: astro
          path: public

      - name: Download rustdoc artifact
        uses: actions/download-artifact@v4
        with:
          name: rustdoc
          path: public/api

      - name: Debug - List public directory
        run: |
          echo "Contents of public directory:"
          ls -la public/
          echo ""
          echo "Contents of public/index.html:"
          head -20 public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
