name: Documentation

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build mdBook documentation
  build-book:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build book
        run: |
          cd docs
          mdbook build

      - name: Upload book artifact
        uses: actions/upload-artifact@v7
        with:
          name: book
          path: docs/book/

  # Build Rust API documentation
  build-rustdoc:
    name: Build Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings --cfg docsrs"

      - name: Add redirect index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=balinese_calendar">' > target/doc/index.html

      - name: Upload rustdoc artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustdoc
          path: target/doc/

  # Combine and deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-book, build-rustdoc]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download book artifact
        uses: actions/download-artifact@v8
        with:
          name: book
          path: public

      - name: Download rustdoc artifact
        uses: actions/download-artifact@v8
        with:
          name: rustdoc
          path: public/api

      - name: Move book content to root
        run: |
          ls -la public/
          if [ -d "public/book" ]; then
            mv public/book/* public/
            rmdir public/book
          else
            echo "Book directory not found, checking structure..."
            find public -name "*.html" | head -5
          fi

      - name: Create landing page
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Balinese Calendar Documentation</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                line-height: 1.6;
                color: #333;
                max-width: 1200px;
                margin: 0 auto;
                padding: 2rem;
                background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                min-height: 100vh;
              }
              .header {
                text-align: center;
                margin-bottom: 3rem;
                animation: fadeInDown 0.8s ease-out;
              }
              .logo {
                font-size: 4rem;
                margin-bottom: 1rem;
              }
              h1 {
                font-size: 2.5rem;
                color: #2c3e50;
                margin-bottom: 0.5rem;
                font-weight: 700;
              }
              .subtitle {
                font-size: 1.2rem;
                color: #7f8c8d;
                margin-bottom: 2rem;
              }
              .docs-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 2rem;
                margin-bottom: 3rem;
              }
              .doc-card {
                background: white;
                border-radius: 12px;
                padding: 2rem;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                animation: fadeInUp 0.8s ease-out;
              }
              .doc-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.15);
              }
              .doc-icon {
                font-size: 2.5rem;
                margin-bottom: 1rem;
                display: block;
              }
              .doc-title {
                font-size: 1.5rem;
                color: #2c3e50;
                margin-bottom: 1rem;
                font-weight: 600;
              }
              .doc-description {
                color: #7f8c8d;
                margin-bottom: 1.5rem;
                line-height: 1.6;
              }
              .doc-link {
                display: inline-block;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 0.8rem 1.5rem;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 500;
                transition: transform 0.2s ease;
              }
              .doc-link:hover {
                transform: scale(1.05);
              }
              .features {
                background: white;
                border-radius: 12px;
                padding: 2rem;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                margin-bottom: 2rem;
              }
              .features h2 {
                color: #2c3e50;
                margin-bottom: 1.5rem;
                text-align: center;
              }
              .feature-list {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 1rem;
              }
              .feature-item {
                display: flex;
                align-items: center;
                padding: 0.5rem;
              }
              .feature-icon {
                color: #667eea;
                margin-right: 0.5rem;
                font-weight: bold;
              }
              .footer {
                text-align: center;
                color: #7f8c8d;
                margin-top: 2rem;
                padding-top: 2rem;
                border-top: 1px solid #ecf0f1;
              }
              @keyframes fadeInDown {
                from { opacity: 0; transform: translateY(-20px); }
                to { opacity: 1; transform: translateY(0); }
              }
              @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
              }
              @media (max-width: 768px) {
                .docs-grid {
                  grid-template-columns: 1fr;
                }
                .logo {
                  font-size: 3rem;
                }
                h1 {
                  font-size: 2rem;
                }
              }
            </style>
          </head>
          <body>
            <div class="header">
              <div class="logo">📅</div>
              <h1>Balinese Calendar</h1>
              <p class="subtitle">The first native Rust implementation of the Balinese Saka Calendar</p>
            </div>

            <div class="docs-grid">
              <div class="doc-card">
                <span class="doc-icon">📖</span>
                <h2 class="doc-title">User Guide</h2>
                <p class="doc-description">
                  Complete documentation for using the Balinese Calendar crate.
                  Learn about installation, basic usage, and advanced features.
                </p>
                <a href="./introduction.html" class="doc-link">Read the Guide</a>
              </div>

              <div class="doc-card">
                <span class="doc-icon">🔧</span>
                <h2 class="doc-title">API Reference</h2>
                <p class="doc-description">
                  Detailed API documentation for all functions, structs, and enums
                  in the Balinese Calendar library.
                </p>
                <a href="./api/balinese_calendar/" class="doc-link">View API Docs</a>
              </div>
            </div>

            <div class="features">
              <h2>Key Features</h2>
              <div class="feature-list">
                <div class="feature-item">
                  <span class="feature-icon">✓</span>
                  <span>Native Rust implementation</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">✓</span>
                  <span>No-std compatible</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">✓</span>
                  <span>Complete Pawukon cycle support</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">✓</span>
                  <span>Astronomical calculations</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">✓</span>
                  <span>Comprehensive date validation</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">✓</span>
                  <span>MSRV 1.86.0+ support</span>
                </div>
              </div>
            </div>

            <div class="footer">
              <p>
                <strong>Balinese Calendar</strong> •
                <a href="https://github.com/SHA888/balinese-calendar" style="color: #667eea;">GitHub Repository</a> •
                <a href="https://crates.io/crates/balinese-calendar" style="color: #667eea;">Crates.io</a>
              </p>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
