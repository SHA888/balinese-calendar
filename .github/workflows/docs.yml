name: Documentation

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build mdBook documentation
  build-book:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build book
        run: |
          cd docs
          mdbook build

      - name: Upload book artifact
        uses: actions/upload-artifact@v7
        with:
          name: book
          path: docs/book/

  # Build Rust API documentation
  build-rustdoc:
    name: Build Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings --cfg docsrs"

      - name: Add redirect index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=balinese_calendar">' > target/doc/index.html

      - name: Upload rustdoc artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustdoc
          path: target/doc/

  # Combine and deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-book, build-rustdoc]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download book artifact
        uses: actions/download-artifact@v8
        with:
          name: book
          path: public

      - name: Download rustdoc artifact
        uses: actions/download-artifact@v8
        with:
          name: rustdoc
          path: public/api

      - name: Move book content to root
        run: |
          ls -la public/
          if [ -d "public/book" ]; then
            mv public/book/* public/
            rmdir public/book
          else
            echo "Book directory not found, checking structure..."
            find public -name "*.html" | head -5
          fi

      - name: Create index redirect
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Balinese Calendar Documentation</title>
            <meta http-equiv="refresh" content="0; url=./introduction.html">
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
              }
              .container {
                text-align: center;
              }
              h1 { font-size: 3em; margin-bottom: 0.5em; }
              p { font-size: 1.2em; margin-bottom: 2em; }
              a {
                display: inline-block;
                padding: 12px 30px;
                margin: 10px;
                background: white;
                color: #667eea;
                text-decoration: none;
                border-radius: 5px;
                font-weight: bold;
                transition: transform 0.2s;
              }
              a:hover { transform: scale(1.05); }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>📅 Balinese Calendar</h1>
              <p>Redirecting to documentation...</p>
              <div>
                <a href="./introduction.html">User Guide</a>
                <a href="./api/balinese_calendar/">API Reference</a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
